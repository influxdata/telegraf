# Send OpenTelemetry metrics over gRPC
[[outputs.opentelemetry]]
  ## Override the default (localhost:4317) OpenTelemetry gRPC service
  ## When the protocol is grpc, address:port
  ## When the protocol is http, http(s)://address:port/path
  # service_address = "localhost:4317"
  ## Override the default (protobuf) encodingType when Protocol is http
  ## protobuf, json
  # encoding_type = "protobuf"

  ## Override the default (prometheus) metric name format
  ## prometheus: converts dots to underscores (default, Prometheus-compatible)
  ## otel: preserves dot-separated names (OpenTelemetry semantic conventions)
  # metric_name_format = "prometheus"

  ## Override the default (5s) request timeout
  # timeout = "5s"

  ## Optional TLS Config.
  ##
  ## Root certificates for verifying server certificates encoded in PEM format.
  # tls_ca = "/etc/telegraf/ca.pem"
  ## The public and private key pairs for the client encoded in PEM format.
  ## May contain intermediate certificates.
  # tls_cert = "/etc/telegraf/cert.pem"
  # tls_key = "/etc/telegraf/key.pem"
  ## Use TLS, but skip TLS chain and host verification.
  # insecure_skip_verify = false
  ## Send the specified TLS server name via SNI.
  # tls_server_name = "foo.example.com"

  ## Override the default (gzip) compression used to send data.
  ## Supports: "gzip", "none"
  # compression = "gzip"

  ## Optional proxy settings for HTTP endpoints (service_address starts with http:// or https://)
  # use_system_proxy = false
  # http_proxy_url = ""

  ## Optional proxy settings for gRPC endpoints (service_address is host:port)
  # use_proxy = false
  # proxy_url = ""

  ## NOTE: Due to the way TOML is parsed, tables must be at the END of the
  ## plugin definition, otherwise additional config options are read as part of
  ## the table

  ## Configuration options for the Coralogix dialect
  ## Enable the following section of you use this plugin with a Coralogix endpoint
  # [outputs.opentelemetry.coralogix]
  #   ## Your Coralogix private key (required).
  #   ## Please note that this is sensitive data!
  #   private_key = "your_coralogix_key"
  #
  #   ## Application and subsystem names for the metrics (required)
  #   application = "$NAMESPACE"
  #   subsystem = "$HOSTNAME"

  ## Additional OpenTelemetry resource attributes
  # [outputs.opentelemetry.attributes]
  # "service.name" = "demo"

  ## Optional Bearer token for authentication.
  ## Supports secret-store references, e.g. @{<store-id>:<key>}, so tokens
  ## fetched via the oauth2 secret store are refreshed automatically.
  # token = ""

  ## Additional gRPC request metadata / HTTP headers
  # [outputs.opentelemetry.headers]
  # key1 = "value1"

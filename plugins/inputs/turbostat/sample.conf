# Run Turbostat and parses stdout as metrics.
[[inputs.turbostat]]
  # Whether the Turbostat process should be called with sudo.
  use_sudo = true
  # The path to the Turbostat exectuable. Can be omitted if in the PATH.
  path = "/usr/bin/turbostat"
  # How often Turbostat produces metrics. 10s by default.
  interval = "10s"

[agent]
    omit_hostname = true
    skip_processors_before_aggregators = true

[[inputs.file]]
    files = ["testcases/skip-processors-before-no-aggregators/input.influx"]
    data_format = "influx"

[[processors.starlark]]
    source = '''
def apply(metric):
    for k,v in metric.fields.items():
        if type(v) == "float":
            metric.fields[k] = v * 10
    return metric
'''
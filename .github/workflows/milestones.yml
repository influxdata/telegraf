name: Milestones
on:
  pull_request_target:
    types:
      - closed

permissions:
  issues: write
  pull-requests: write

jobs:
  milestone_job:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    name: Assign milestones to PRs
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Assign milestone to PR
        uses: srebhan/label-milestone-action@6d4bf8afb126941ad1581415465beb356ff76a66 # v1.1.0
        id: assign-milestone
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          bugfix-labels: 'fix,chore,docs,test'
          minor-labels: 'feat'
          major-labels: 'breaking change'
          fallback: 'minor'
      - name: Show milestone
        run: echo "Assigned milestone is ${{ steps.assign-milestone.outputs.milestone }}"
